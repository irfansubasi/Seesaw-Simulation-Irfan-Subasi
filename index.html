<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Seesaw Simulation</title>
  </head>
  <body>
    <main>
      <section class="info-panel">
        <div class="info-box-wrapper">
          <div class="info-box">
            <span class="label">Left Weight</span>
            <span class="value left-weight-value">0.0 kg</span>
          </div>
          <div class="info-box">
            <span class="label">Right Weight</span>
            <span class="value right-weight-value">0.0 kg</span>
          </div>
          <div class="info-box">
            <span class="label">Next Weight</span>
            <span class="value next-weight-value">0.0 kg</span>
          </div>
          <div class="info-box">
            <span class="label">Tilt Angle</span>
            <span class="value angle-value">0.0°</span>
          </div>
        </div>
      </section>
      <section class="seesaw">
        <div class="seesaw-wrapper">
          <div class="plank"></div>
          <div class="pivot"></div>
        </div>
      </section>
      <section class="controls">
        <div class="controls-wrapper">
          <button class="btn">Reset</button>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
